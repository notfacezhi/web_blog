<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .nav-header {
            width: 100%;
            height: 80px;
            border-bottom: 1px solid #000;
            background: white;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 4vw;
            height: 100%;
            display: flex;
            align-items: center;
        }
        
        .brand-logo {
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            color: #000;
        }
        
        .nav-links {
            list-style: none;
            gap: 3rem;
            display: flex;
            margin: 0;
            margin-left: auto;
        }
        
        .nav-links a {
            text-decoration: none;
            color: #000;
            font-size: 0.8125rem;
        }
    </style>
</head>
<body>
    <nav class="nav-header">
        <div class="container">
            <a href="#" class="brand-logo">The Art of Content</a>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#contributors">Contributors</a></li>
                <li><a href="#archives">Full Archives</a></li>
            </ul>
        </div>
    </nav>
</body>
</html>
