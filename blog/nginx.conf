# Nginx 配置 - 博客前后端分离部署
# 使用方法：
# 1. 将此文件复制到 /etc/nginx/sites-available/blog.conf
# 2. 创建软链接: ln -s /etc/nginx/sites-available/blog.conf /etc/nginx/sites-enabled/
# 3. 测试配置: nginx -t
# 4. 重载配置: nginx -s reload

server {
    listen 80;
    server_name your-domain.com;  # 修改为你的域名
    
    # 日志配置
    access_log /var/log/nginx/blog_access.log;
    error_log /var/log/nginx/blog_error.log;
    
    # 前端静态文件
    location / {
        root /path/to/blog;  # 修改为前端文件实际路径
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 静态资源缓存
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # 后端 API 反向代理 ⭐
    location /api {
        proxy_pass http://127.0.0.1:8091;  # 后端服务地址
        proxy_http_version 1.1;
        
        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # API 文档（可选）
    location /docs {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /openapi.json {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
    }
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
}

