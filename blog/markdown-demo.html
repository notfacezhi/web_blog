<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Markdown转HTML演示</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .panel {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .panel-header {
            background: #333;
            color: white;
            padding: 15px;
            font-weight: bold;
        }
        
        .panel-content {
            padding: 20px;
            min-height: 500px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        textarea {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            padding: 0;
        }
        
        .html-output {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: #f8f8f8;
            padding: 15px;
            border: 1px solid #e0e0e0;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .rendered-output {
            line-height: 1.8;
        }
        
        .rendered-output h2 {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        
        .rendered-output p {
            margin-bottom: 1rem;
        }
        
        .rendered-output ul, .rendered-output ol {
            margin-bottom: 1rem;
            padding-left: 2rem;
        }
        
        .rendered-output li {
            margin-bottom: 0.5rem;
        }
        
        .rendered-output blockquote {
            border-left: 3px solid #333;
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: #555;
        }
        
        .rendered-output strong {
            font-weight: bold;
        }
        
        .rendered-output em {
            font-style: italic;
        }
        
        .rendered-output a {
            color: #0066cc;
            text-decoration: underline;
        }
        
        .rendered-output code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        
        .rendered-output table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.5rem 0;
            border: 1px solid #ddd;
        }
        
        .rendered-output th {
            background: #f5f5f5;
            font-weight: bold;
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }
        
        .rendered-output td {
            padding: 10px 12px;
            border: 1px solid #ddd;
        }
        
        .rendered-output tr:hover {
            background: #fafafa;
        }
        
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        button:hover {
            background: #0052a3;
        }
    </style>
</head>
<body>
    <h1>📝 Markdown转HTML实时演示</h1>
    <p>在左侧输入Markdown,右侧会实时显示转换后的HTML代码和渲染效果</p>
    
    <button onclick="loadExample()">加载示例Markdown</button>
    
    <div class="container">
        <!-- Markdown输入 -->
        <div class="panel">
            <div class="panel-header">Markdown输入</div>
            <div class="panel-content">
                <textarea id="markdownInput" placeholder="在这里输入Markdown...">## 欢迎使用Markdown

这是一个**加粗文本**和*斜体文本*的示例。

### 列表示例

- 列表项1
- 列表项2
- 列表项3

### 引用示例

> 这是一段引用文本

### 链接示例

这是一个[链接](https://example.com)

### 代码示例

这是`行内代码`示例。</textarea>
            </div>
        </div>
        
        <!-- 右侧输出 -->
        <div class="panel">
            <div class="panel-header">渲染效果</div>
            <div class="panel-content rendered-output" id="renderedOutput">
            </div>
        </div>
    </div>
    
    <div class="container" style="margin-top: 20px;">
        <div class="panel" style="grid-column: span 2;">
            <div class="panel-header">生成的HTML代码</div>
            <div class="panel-content">
                <div class="html-output" id="htmlOutput"></div>
            </div>
        </div>
    </div>
    
    <script>
        const markdownInput = document.getElementById('markdownInput');
        const renderedOutput = document.getElementById('renderedOutput');
        const htmlOutput = document.getElementById('htmlOutput');
        
        // 实时转换
        function convertMarkdown() {
            const markdown = markdownInput.value;
            const html = marked.parse(markdown);
            
            // 显示渲染效果
            renderedOutput.innerHTML = html;
            
            // 显示HTML代码
            htmlOutput.textContent = html;
        }
        
        // 加载示例
        function loadExample() {
            markdownInput.value = `## 标题示例

这是一个段落,包含**加粗文本**、*斜体文本*和[链接](https://example.com)。

## 表格示例

| 姓名 | 年龄 | 职位 |
| --- | --- | --- |
| 张三 | 28 | 前端工程师 |
| 李四 | 32 | 后端工程师 |
| 王五 | 25 | 设计师 |

### 对齐方式

| 左对齐 | 居中对齐 | 右对齐 |
| :--- | :---: | ---: |
| 内容1 | 内容2 | 内容3 |
| 长内容示例 | 中等长度 | 短 |

## 列表示例

### 无序列表

- 第一项
- 第二项
  - 子项1
  - 子项2
- 第三项

### 有序列表

1. 第一步
2. 第二步
3. 第三步

## 引用示例

> "这是一段引用文本,通常用于突出重要信息或引用他人的话。"

## 代码示例

这是\`行内代码\`的示例。

## 强调示例

这是**非常重要**的文本,这是*需要注意*的文本。

## 分隔线

---

## 复杂表格示例

| 功能 | Markdown语法 | HTML输出 |
| --- | --- | --- |
| 加粗 | \`**文本**\` | \`<strong>文本</strong>\` |
| 斜体 | \`*文本*\` | \`<em>文本</em>\` |
| 链接 | \`[文本](URL)\` | \`<a href="URL">文本</a>\` |

> 记住:实践是最好的老师!`;
            convertMarkdown();
        }
        
        // 监听输入变化
        markdownInput.addEventListener('input', convertMarkdown);
        
        // 初始转换
        convertMarkdown();
    </script>
</body>
</html>
